  <style>

    .recent-list .r-thumb { width: 64px; min-width: 64px; aspect-ratio: 16/10; border-radius: 4px; overflow: hidden; background: #eee; }
    [data-theme="dark"] .recent-list .r-thumb { background: #222; }
    .recent-list .r-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .recent-list .r-info { flex: 1; }
    .recent-list .r-title { font-size: 12px; font-weight: 500; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .recent-list .r-date { font-family: 'Poppins', sans-serif; font-size: 10px; color: var(--text-muted); }

    /* RANKING */

    .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }

    footer { background: #0d0d0d; padding: 48px 40px 28px; color: #fff; }

    /* BACK TO TOP */
    .btt { position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px; border-radius: 50%; background: var(--navy); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 90; box-shadow: 0 4px 12px rgba(5,15,119,0.3); }

    }

</head>

  <script>

    const CAT_NORMALIZE = { 'custom_': '広告運用ノウハウ', 'custom_web-advertising': 'Web広告', 'custom_digital_marketing': 'デジタルマーケティング' };
    ARTICLES.forEach(a => { if (CAT_NORMALIZE[a.category]) a.category = CAT_NORMALIZE[a.category]; });

    function cc(cat) { return CAT_COLORS[cat] || '#455a64'; }
    function url(a) { return 'https://rrch-inc.com/info/' + a.slug; }
    function parseDate(d) { const p = d.split('.'); return new Date(p[0], parseInt(p[1])-1, parseInt(p[2])); }
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function highlightText(t, q) { if (!q) return t; return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<span class="search-highlight">$1</span>'); }

    const PH_SVG = `<div class="ph"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
    function thumbHtml(a) { return a.cover ? `<img src="${a.cover}" alt="" loading="lazy">` : PH_SVG; }

    let currentFilter = 'all', currentSort = 'desc', displayCount = 12;

    function sorted() { return [...ARTICLES].sort((a,b) => { const da=parseDate(a.date), db=parseDate(b.date); return currentSort==='desc' ? db-da : da-db; }); }
    function filtered() {
      const q = (document.getElementById('search-input')?.value||'').toLowerCase().trim();
      let pool = sorted();
      if (q) pool = pool.filter(a => a.title.toLowerCase().includes(q) || a.category.toLowerCase().includes(q));
      if (currentFilter !== 'all') pool = pool.filter(a => a.category === currentFilter);
      return pool;
    }

    /* === HERO === */
    function renderHero() {
      const arts = sorted();
      if (!arts.length) return;
      // Hero shows articles with cover images for visual impact
      const withCover = arts.filter(a => a.cover);
      const main = withCover[0] || arts[0];
      const subPool = withCover.length > 1 ? withCover.slice(1, 4) : arts.slice(1, 4);
      const subs = subPool;
      document.getElementById('hero-section').innerHTML = `
        <div class="hero-featured">
          <a href="${url(main)}" target="_blank" class="hero-main">
            ${main.cover ? `<img src="${main.cover}" alt="" loading="lazy">` : PH_SVG}
            <div class="overlay">
              <span class="tag" style="background:${cc(main.category)}">${main.category}</span>
              <span class="date">${main.date}</span>
              <div class="title">${main.title}</div>
            </div>
          </a>
          <div class="hero-sub">
            ${subs.map(a => `
              <a href="${url(a)}" target="_blank" class="hero-sub-card">
                <div class="thumb">${thumbHtml(a)}</div>
                <div class="info">
                  <div class="meta">
                    <span class="date">${a.date}</span>
                    <span class="badge" style="background:${cc(a.category)}">${a.category}</span>
                  </div>
                  <div class="stitle">${a.title}</div>
                </div>
              </a>
            `).join('')}
          </div>
        </div>`;
    }

    /* === SIDEBAR === */
    function renderSidebar() {
      const counts = {};
      ARTICLES.forEach(a => { counts[a.category] = (counts[a.category]||0)+1; });
      const cats = Object.entries(counts).sort((a,b) => b[1]-a[1]);
      document.getElementById('cat-list').innerHTML =
        `<li><button class="active" data-cat="all" onclick="setFilter('all')">すべての記事 <span class="count">${ARTICLES.length}</span></button></li>` +
        cats.map(([c,n]) => `<li><button data-cat="${c}" onclick="setFilter('${c.replace(/'/g,"\\'")}')">${c} <span class="count">${n}</span></button></li>`).join('');

      // Ranking - simulate popularity based on slug hash + cover availability
      // (Articles with covers and diverse categories get higher scores)
      const rankPool = ARTICLES.filter(a => a.cover);
      const catSeen = {};
      const ranked = rankPool.map(a => {
        let score = 0;
        // Prefer articles with images
        if (a.cover) score += 10;
        // Prefer category diversity
        if (!catSeen[a.category]) { score += 5; catSeen[a.category] = true; }
        // Stable pseudo-random based on slug
        let hash = 0;
        for (let i = 0; i < a.slug.length; i++) hash = ((hash << 5) - hash + a.slug.charCodeAt(i)) | 0;
        score += Math.abs(hash % 20);
        return { ...a, score };
      }).sort((a, b) => b.score - a.score).slice(0, 8);

      document.getElementById('ranking-list').innerHTML = ranked.map((a, i) => `
        <li><a href="${url(a)}" target="_blank">
          <span class="rank-num">${i + 1}</span>
          <div class="rank-thumb">${thumbHtml(a)}</div>
          <div class="rank-info">
            <div class="rank-title">${a.title}</div>
            <div class="rank-cat">${a.category}</div>
          </div>
        </a></li>
      `).join('');

      const recent = sorted().filter(a => a.cover).slice(0, 5);
      document.getElementById('recent-list').innerHTML = recent.map(a => `
        <li><a href="${url(a)}" target="_blank">
          <div class="r-thumb">${thumbHtml(a)}</div>
          <div class="r-info">
            <div class="r-title">${a.title}</div>
            <div class="r-date">${a.date}</div>
          </div>
        </a></li>
      `).join('');
    }

    /* === ARTICLES GRID === */
    function renderArticles() {
      const q = (document.getElementById('search-input')?.value||'').toLowerCase().trim();
      const pool = filtered();

      // Update header
      const titleEl = document.getElementById('content-title');
      const countEl = document.getElementById('content-count');
      if (q) {
        titleEl.innerHTML = `「${escapeHtml(q)}」の検索結果 <span id="content-count">${pool.length}</span>件`;
      } else if (currentFilter !== 'all') {
        titleEl.innerHTML = `${currentFilter} <span id="content-count">${pool.length}</span>件`;
      } else {
        titleEl.innerHTML = `全記事 <span id="content-count">${pool.length}</span>件`;
      }

      if (!pool.length) {
        document.getElementById('articles-container').innerHTML = `<div class="no-results"><p>該当する記事がありません</p></div>`;
        return;
      }

      const visible = q ? pool : pool.slice(0, displayCount);
      const hasMore = !q && pool.length > displayCount;

      let html = '<div class="article-grid">' + visible.map((a, i) => {
        const title = highlightText(a.title, q);
        return `
          <a href="${url(a)}" target="_blank" class="card fade-in" style="transition-delay:${Math.min(i,11)*0.03}s">
            <div class="card-thumb">
              ${thumbHtml(a)}
              <span class="badge" style="background:${cc(a.category)}">${a.category}</span>
            </div>
            <div class="card-body">
              <div class="card-date">${a.date}</div>
              <div class="card-title">${title}</div>
              <div class="card-cat">${a.category}</div>
            </div>
          </a>`;
      }).join('') + '</div>';

      if (hasMore) {
        html += `<div class="load-more-wrap"><button class="load-more-btn" onclick="loadMore()">もっと見る（残り ${pool.length - displayCount} 件）</button></div>`;
      }

      document.getElementById('articles-container').innerHTML = html;
      observeFadeIn();
    }

    function loadMore() { displayCount += 12; renderArticles(); }
    function setFilter(cat) {
      currentFilter = cat; displayCount = 12;
      document.querySelectorAll('.cat-list button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      renderArticles();
    }
    function setSort(order) {
      currentSort = order; displayCount = 12;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === order));
      renderHero(); renderArticles();
    }
    function onSearch() { displayCount = 12; renderArticles(); }

    /* === THEME === */
    function initTheme() {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-icon').innerHTML = '&#9728;';
      }
    }
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) { document.documentElement.removeAttribute('data-theme'); document.getElementById('theme-icon').innerHTML = '&#9790;'; localStorage.setItem('theme','light'); }
      else { document.documentElement.setAttribute('data-theme','dark'); document.getElementById('theme-icon').innerHTML = '&#9728;'; localStorage.setItem('theme','dark'); }
    });

    /* === MOBILE MENU === */
    document.getElementById('hamburger').addEventListener('click', () => { document.getElementById('mob-overlay').classList.toggle('open'); });
    document.getElementById('mob-close').addEventListener('click', () => { document.getElementById('mob-overlay').classList.remove('open'); });

    /* === BACK TO TOP === */
    const btt = document.getElementById('btt');
    window.addEventListener('scroll', () => { btt.classList.toggle('show', window.scrollY > 400); }, { passive: true });
    btt.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

    /* === FADE IN OBSERVER === */
    const fadeObserver = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); fadeObserver.unobserve(e.target); } });
    }, { threshold: 0.05 });
    function observeFadeIn() { document.querySelectorAll('.fade-in:not(.visible)').forEach(el => fadeObserver.observe(el)); }

    /* === INIT === */
    initTheme();
    renderHero();
    renderSidebar();
    renderArticles();
  </script>
</body>
</html>
