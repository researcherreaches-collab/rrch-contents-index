  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #050f77;
      --navy-light: #1a2a9b;
      --dark: #0d0d0d;
      --text: #1a1a1a;
      --text-sub: #6b7280;
      --text-muted: #9ca3af;
      --border: rgba(0,0,0,0.06);
      --bg: #fafafa;
      --white: #fff;
      --card-bg: #fff;
      --header-bg: rgba(255,255,255,0.85);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ===== DARK MODE ===== */
    [data-theme="dark"] {
      --dark: #0d0d0d;
      --text: #e4e4e7;
      --text-sub: #a1a1aa;
      --text-muted: #71717a;
      --border: rgba(255,255,255,0.08);
      --bg: #111111;
      --white: #0d0d0d;
      --card-bg: #1a1a1a;
      --header-bg: rgba(13,13,13,0.88);
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    a { text-decoration: none; color: inherit; }
    img { display: block; }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border-bottom: 1px solid var(--border);
      transition: background 0.4s ease;
    }

    .header-logo img { width: 220px; height: auto; }
    [data-theme="dark"] .header-logo img { filter: brightness(2); }

    .header-right { display: flex; align-items: center; gap: 20px; }

    nav { display: flex; gap: 32px; }

    nav a {
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      position: relative;
      transition: color 0.3s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 2px;
      background: var(--navy);
      transition: width 0.3s var(--ease);
    }
    nav a:hover { color: var(--navy); }
    nav a:hover::after { width: 100%; }
    [data-theme="dark"] nav a:hover { color: #8b9cf7; }
    [data-theme="dark"] nav a::after { background: #8b9cf7; }

    /* ===== DARK MODE TOGGLE ===== */
    .theme-toggle {
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: var(--text-sub);
      transition: all 0.3s;
    }
    .theme-toggle:hover { border-color: var(--navy); color: var(--navy); }
    [data-theme="dark"] .theme-toggle:hover { border-color: #8b9cf7; color: #8b9cf7; }

    /* ===== HAMBURGER MENU ===== */
    .hamburger {
      display: none;
      width: 40px; height: 40px;
      border: none;
      background: transparent;
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      z-index: 201;
    }
    .hamburger span {
      display: block;
      width: 22px; height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.3s var(--ease);
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .mobile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s var(--ease);
    }
    .mobile-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .mobile-overlay a {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: color 0.3s;
      transform: translateY(20px);
      opacity: 0;
    }
    .mobile-overlay.open a {
      opacity: 1;
      transform: translateY(0);
    }
    .mobile-overlay a:nth-child(1) { transition: all 0.4s 0.05s var(--ease); }
    .mobile-overlay a:nth-child(2) { transition: all 0.4s 0.1s var(--ease); }
    .mobile-overlay a:nth-child(3) { transition: all 0.4s 0.15s var(--ease); }
    .mobile-overlay a:nth-child(4) { transition: all 0.4s 0.2s var(--ease); }
    .mobile-overlay a:nth-child(5) { transition: all 0.4s 0.25s var(--ease); }
    .mobile-overlay a:hover { color: #fff; }

    .mobile-close {
      position: absolute;
      top: 24px; right: 24px;
      width: 44px; height: 44px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 28px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.3s;
    }
    .mobile-close:hover { color: #fff; }

    /* ===== HERO SECTION ===== */
    .hero-section {
      background: linear-gradient(165deg, #020a5c 0%, #0a1a8f 40%, #1229a8 100%);
      padding: 72px 56px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      top: -200px; right: -100px;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 60%);
      border-radius: 50%;
    }

    .hero-section::after {
      content: '';
      position: absolute;
      bottom: -300px; left: -150px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(100,140,255,0.06) 0%, transparent 60%);
      border-radius: 50%;
    }

    .hero-eyebrow {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: 'Poppins', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
      line-height: 1.15;
      position: relative;
      z-index: 1;
    }

    .hero-search {
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }

    .hero-search-box {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      max-width: 520px;
      padding: 0 24px;
      transition: all 0.3s var(--ease);
      backdrop-filter: blur(8px);
    }

    .hero-search-box:focus-within {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .hero-search-icon {
      color: rgba(255,255,255,0.4);
      min-width: 20px;
      transition: color 0.3s;
    }

    .hero-search-box:focus-within .hero-search-icon {
      color: rgba(255,255,255,0.7);
    }

    .hero-search-box input {
      flex: 1;
      padding: 16px 14px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-family: 'Noto Sans JP', sans-serif;
      color: #fff;
      outline: none;
      letter-spacing: 0.03em;
    }

    .hero-search-box input::placeholder {
      color: rgba(255,255,255,0.35);
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 20px 56px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      transition: background 0.4s ease;
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .stat-number {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
    }
    [data-theme="dark"] .stat-number { color: #8b9cf7; }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ===== BREADCRUMB ===== */
    .breadcrumb {
      padding: 12px 56px;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      letter-spacing: 0.04em;
      transition: background 0.4s ease;
    }
    .breadcrumb a { color: var(--text-muted); transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--navy); }
    .breadcrumb span { color: var(--text-sub); }
    [data-theme="dark"] .breadcrumb a:hover { color: #8b9cf7; }

    /* ===== MAIN ===== */
    .main-wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 60px 56px 120px;
    }

    /* ===== FEATURED (Latest 3) ===== */
    .featured-label {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    [data-theme="dark"] .featured-label { color: #8b9cf7; }

    .featured-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .featured-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 20px;
      margin-bottom: 72px;
    }

    .featured-card {
      display: block;
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      background: #000;
      transition: transform 0.45s var(--ease), box-shadow 0.45s var(--ease);
    }

    .featured-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 28px 64px rgba(5,15,119,0.15);
    }

    .featured-card.main {
      grid-row: 1 / 3;
    }

    .featured-card .featured-img {
      width: 100%;
      height: 100%;
      min-height: 280px;
      object-fit: cover;
      transition: transform 0.6s var(--ease), opacity 0.4s;
      opacity: 0.85;
    }

    .featured-card:hover .featured-img {
      transform: scale(1.04);
      opacity: 0.75;
    }

    .featured-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 32px;
    }

    .featured-card.sub .featured-overlay { padding: 24px; }

    .featured-tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      width: fit-content;
      text-transform: uppercase;
    }

    .featured-date {
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .featured-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      line-height: 1.6;
      letter-spacing: 0.01em;
    }

    .featured-card.sub .featured-title { font-size: 15px; line-height: 1.6; }
    .featured-card.main .featured-title { font-size: 22px; }

    .featured-read {
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.35s var(--ease);
    }

    .featured-card:hover .featured-read {
      opacity: 1;
      transform: translateY(0);
    }

    .featured-read .arrow {
      display: inline-block;
      transition: transform 0.3s;
    }

    .featured-card:hover .featured-read .arrow { transform: translateX(4px); }

    /* ===== DIVIDER ===== */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .section-divider .label {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ===== CONTROLS ===== */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .controls-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .controls-right { display: flex; align-items: center; gap: 12px; }

    .view-toggle { display: flex; gap: 4px; }

    .view-btn {
      width: 38px; height: 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card-bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      color: var(--text-muted);
      font-size: 16px;
    }

    .view-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }
    .view-btn:hover:not(.active) { border-color: var(--navy); color: var(--navy); }
    [data-theme="dark"] .view-btn:hover:not(.active) { border-color: #8b9cf7; color: #8b9cf7; }

    /* ===== SORT BUTTONS ===== */
    .sort-btns { display: flex; gap: 4px; }

    .sort-btn {
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--card-bg);
      color: var(--text-sub);
      transition: all 0.2s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .sort-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }
    .sort-btn:hover:not(.active) { border-color: var(--navy); color: var(--navy); }
    [data-theme="dark"] .sort-btn:hover:not(.active) { border-color: #8b9cf7; color: #8b9cf7; }

    /* ===== CATEGORY PILLS ===== */
    .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; }

    .pill {
      padding: 7px 18px;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--card-bg);
      color: var(--text-sub);
      transition: all 0.2s;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.03em;
    }

    .pill:hover { border-color: var(--navy); color: var(--navy); }
    .pill.active { background: var(--navy); border-color: var(--navy); color: #fff; }
    [data-theme="dark"] .pill:hover { border-color: #8b9cf7; color: #8b9cf7; }

    /* ===== SEARCH RESULT COUNT ===== */
    .result-count {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
      font-weight: 500;
    }
    .result-count strong {
      color: var(--navy);
      font-weight: 700;
    }
    [data-theme="dark"] .result-count strong { color: #8b9cf7; }

    /* ===== SEARCH HIGHLIGHT ===== */
    .search-highlight {
      background: rgba(255, 215, 0, 0.35);
      border-radius: 2px;
      padding: 0 1px;
    }
    [data-theme="dark"] .search-highlight {
      background: rgba(255, 193, 7, 0.3);
      color: #ffd54f;
    }

    /* ===== ARTICLE GRID ===== */
    .article-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .article-grid.active { display: grid; }
    .article-grid { display: none; }

    .card {
      display: block;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid var(--border);
      transition: all 0.4s var(--ease);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 48px rgba(5,15,119,0.08);
      border-color: rgba(5,15,119,0.08);
    }
    [data-theme="dark"] .card:hover {
      box-shadow: 0 24px 48px rgba(0,0,0,0.3);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      position: relative;
      background: #f3f4f6;
    }
    [data-theme="dark"] .card-thumb { background: #222; }

    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s var(--ease);
    }

    .card:hover .card-thumb img { transform: scale(1.06); }

    .card-thumb .badge {
      position: absolute;
      top: 12px; left: 12px;
      padding: 3px 12px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-body { padding: 20px 22px 24px; }

    .card-date {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.75;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.2s;
    }

    .card:hover .card-title { color: var(--navy); }
    [data-theme="dark"] .card:hover .card-title { color: #8b9cf7; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .card-cat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .card-arrow {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      color: #ddd;
      transition: all 0.3s var(--ease);
    }
    [data-theme="dark"] .card-arrow { color: #444; }

    .card:hover .card-arrow { color: var(--navy); transform: translateX(3px); }
    [data-theme="dark"] .card:hover .card-arrow { color: #8b9cf7; }

    /* ===== LIST VIEW ===== */
    .article-list { display: none; }
    .article-list.active { display: block; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 22px 0;
      border-bottom: 1px solid var(--border);
      transition: all 0.3s var(--ease);
    }

    .list-item:first-child { border-top: 1px solid var(--border); }
    .list-item:hover { padding-left: 6px; }

    .list-thumb {
      width: 220px; min-width: 220px;
      aspect-ratio: 16/9;
      border-radius: var(--radius-sm);

    const CAT_COLORS = { 'Knowledge': '#050f77', 'Q&A': '#00897b', 'News': '#1a1a1a', 'Area': '#e65100' };
    function cc(cat) { return CAT_COLORS[cat] || '#050f77'; }

    let currentView = 'grid';
    let currentFilter = 'all';
    let currentSort = 'desc';

    // === UTILITY: Parse date string ===
    function parseDate(d) {
      const parts = d.split('.');
      return new Date(parts[0], parseInt(parts[1]) - 1, parseInt(parts[2]));
    }

    // === UTILITY: Sort articles ===
    function sortArticles(arr) {
      return [...arr].sort((a, b) => {
        const da = parseDate(a.date), db = parseDate(b.date);
        return currentSort === 'desc' ? db - da : da - db;
      });
    }

    // === UTILITY: Highlight text ===
    function highlightText(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escaped})`, 'gi');
      return text.replace(regex, '<span class="search-highlight">$1</span>');
    }

    // === UTILITY: Escape HTML ===
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getSearchQuery() {
      return (document.getElementById('hero-search')?.value || '').toLowerCase().trim();
    }

    function getSearchQueryRaw() {
      return (document.getElementById('hero-search')?.value || '').trim();
    }

    // === FEATURED (top 3) ===
    function renderFeatured() {
      const q = getSearchQuery();
      const qRaw = getSearchQueryRaw();
      let pool = sortArticles(ARTICLES);
      if (q) pool = pool.filter(a => a.title.toLowerCase().includes(q) || a.category.toLowerCase().includes(q));
      const top3 = pool.slice(0, 3);
      const el = document.getElementById('featured-area');
      const noResultsEl = document.getElementById('featured-no-results');

      if (!top3.length && q) {
        el.innerHTML = '';
        el.style.display = 'none';
        document.querySelector('.featured-label').style.display = 'none';
        noResultsEl.style.display = 'block';
        noResultsEl.innerHTML = `
          <div class="no-results">
            <p class="no-results-msg">「<span class="no-results-keyword">${escapeHtml(qRaw)}</span>」に一致する記事が見つかりませんでした</p>
            <a href="http://localhost:3456/?q=${encodeURIComponent(qRaw)}" target="_blank" class="auto-generate-btn">
              この記事を自動生成する &rarr;
            </a>
          </div>`;
        return;
      }

      noResultsEl.style.display = 'none';
      noResultsEl.innerHTML = '';
      document.querySelector('.featured-label').style.display = '';
      el.style.display = '';

      if (!top3.length) { el.innerHTML = ''; return; }
      el.innerHTML = top3.map((a, i) => {
        const cls = i === 0 ? 'main' : 'sub';
        const url = 'https://rrch-inc.com/info/' + a.slug;
        const title = highlightText(a.title, q);
        return `
          <a href="${url}" target="_blank" class="featured-card ${cls}">
            <img class="featured-img" src="${a.cover}" alt="" loading="lazy">
            <div class="featured-overlay">
              <span class="featured-tag" style="background:${cc(a.category)}">${a.category}</span>
              <span class="featured-date">${a.date}</span>
              <div class="featured-title">${title}</div>
              <div class="featured-read">Read more <span class="arrow">&rarr;</span></div>
            </div>
          </a>`;
      }).join('');
    }

    // === FILTERED ===
    function getFiltered() {
      const q = getSearchQuery();
      let pool = sortArticles(ARTICLES);
      if (q) {
        pool = pool.filter(a => a.title.toLowerCase().includes(q) || a.category.toLowerCase().includes(q));
        pool = pool.slice(3);
      } else {
        pool = pool.slice(3);
      }
      if (currentFilter !== 'all') pool = pool.filter(a => a.category === currentFilter);
      return pool;
    }

    // === GRID ===
    function renderGrid(articles) {
      const q = getSearchQuery();
      const qRaw = getSearchQueryRaw();
      if (!articles.length) {
        if (q) {
          return `<div class="no-results">
            <p class="no-results-msg">「<span class="no-results-keyword">${escapeHtml(qRaw)}</span>」に一致する記事が見つかりませんでした</p>
            <a href="http://localhost:3456/?q=${encodeURIComponent(qRaw)}" target="_blank" class="auto-generate-btn">
              この記事を自動生成する &rarr;
            </a>
          </div>`;
        }
        return '<div class="no-results"><p>該当する記事がありません</p></div>';
      }
      return '<div class="article-grid active">' + articles.map((a, i) => {
        const url = 'https://rrch-inc.com/info/' + a.slug;
        const title = highlightText(a.title, q);
        return `
          <a href="${url}" target="_blank" class="card scroll-animate" style="transition-delay:${i * 0.06}s">
            <div class="card-thumb">
              <img src="${a.cover}" alt="" loading="lazy">
              <span class="badge" style="background:${cc(a.category)}">${a.category}</span>
            </div>
            <div class="card-body">
              <div class="card-date">${a.date}</div>
              <div class="card-title">${title}</div>
              <div class="card-footer">
                <span class="card-cat-label">${a.category}</span>
                <span class="card-arrow">&rsaquo;</span>
              </div>
            </div>
          </a>`;
      }).join('') + '</div>';
    }

    // === LIST ===
    function renderList(articles) {
      const q = getSearchQuery();
      const qRaw = getSearchQueryRaw();
      if (!articles.length) {
        if (q) {
          return `<div class="no-results">
            <p class="no-results-msg">「<span class="no-results-keyword">${escapeHtml(qRaw)}</span>」に一致する記事が見つかりませんでした</p>
            <a href="http://localhost:3456/?q=${encodeURIComponent(qRaw)}" target="_blank" class="auto-generate-btn">
              この記事を自動生成する &rarr;
            </a>
          </div>`;
        }
        return '<div class="no-results"><p>該当する記事がありません</p></div>';
      }
      return '<div class="article-list active">' + articles.map((a, i) => {
        const url = 'https://rrch-inc.com/info/' + a.slug;
        const title = highlightText(a.title, q);
        return `
          <a href="${url}" target="_blank" class="list-item scroll-animate" style="transition-delay:${i * 0.04}s">
            <div class="list-thumb"><img src="${a.cover}" alt="" loading="lazy"></div>
            <div class="list-body">
              <div class="list-meta">
                <span class="list-date">${a.date}</span>
                <span class="list-badge" style="background:${cc(a.category)}">${a.category}</span>
              </div>
              <div class="list-title">${title}</div>
            </div>
            <span class="list-arrow">&rsaquo;</span>
          </a>`;
      }).join('') + '</div>';
    }

    // === RESULT COUNT ===
    function updateResultCount(articles) {
      const q = getSearchQuery();
      const qRaw = getSearchQueryRaw();
      const el = document.getElementById('result-count');
      if (q) {
        const totalMatches = ARTICLES.filter(a => a.title.toLowerCase().includes(q) || a.category.toLowerCase().includes(q)).length;
        el.innerHTML = `「<strong>${escapeHtml(qRaw)}</strong>」の検索結果: <strong>${totalMatches}件</strong>`;
      } else {
        el.innerHTML = `全 <strong>${ARTICLES.length} 件</strong>`;
      }
    }

    // === STATS BAR ===
    function updateStats() {
      const q = getSearchQuery();
      const searchWrap = document.getElementById('stat-search-wrap');
      if (q) {
        const totalMatches = ARTICLES.filter(a => a.title.toLowerCase().includes(q) || a.category.toLowerCase().includes(q)).length;
        document.getElementById('stat-search-count').textContent = totalMatches;
        searchWrap.style.display = '';
      } else {
        searchWrap.style.display = 'none';
      }
    }

    function render() {
      const articles = getFiltered();
      document.getElementById('articles-container').innerHTML =
        currentView === 'grid' ? renderGrid(articles) : renderList(articles);
      updateResultCount(articles);
      updateStats();
      // Re-observe new scroll-animate elements
      observeNewElements();
    }

    function switchView(v) {
      currentView = v;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
      render();
    }

    function setFilter(cat) {
      currentFilter = cat;
      document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      render();
    }

    function setSort(order) {
      currentSort = order;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === order));
      renderFeatured();
      render();
    }

    let searchScrolled = false;
    function onSearch() {
      renderFeatured();
      render();
      // Smooth scroll to All Articles section when typing
      const q = getSearchQuery();
      if (q && !searchScrolled) {
        searchScrolled = true;
        setTimeout(() => {
          document.getElementById('all-articles-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 200);
      }
      if (!q) searchScrolled = false;
    }

    function renderPills() {
      const cats = [...new Set(ARTICLES.map(a => a.category))];
      document.getElementById('cat-pills').innerHTML =
        '<button class="pill active" data-cat="all" onclick="setFilter(\'all\')">All</button>' +
        cats.map(c => `<button class="pill" data-cat="${c}" onclick="setFilter('${c}')">${c}</button>`).join('');
    }

    // === DARK MODE ===
    function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        updateThemeIcon('dark');
      }
    }

    function updateThemeIcon(theme) {
      const icon = document.getElementById('theme-icon');
      icon.innerHTML = theme === 'dark' ? '&#9728;' : '&#9790;';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      if (next === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    }

    // === HAMBURGER MENU ===
    function openMobileMenu() {
      document.getElementById('mobile-overlay').classList.add('open');
      document.getElementById('hamburger').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeMobileMenu() {
      document.getElementById('mobile-overlay').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
      document.body.style.overflow = '';
    }

    // === BACK TO TOP ===
    function initBackToTop() {
      const btn = document.getElementById('back-to-top');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('show', window.scrollY > 400);
      }, { passive: true });
      btn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    // === SCROLL ANIMATIONS (Intersection Observer) ===
    const observedElements = new WeakSet();
    const scrollObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          scrollObserver.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.08,
      rootMargin: '0px 0px -40px 0px'
    });

    function observeNewElements() {
      document.querySelectorAll('.scroll-animate').forEach(el => {
        if (!observedElements.has(el)) {
          observedElements.add(el);
          scrollObserver.observe(el);
        }
      });
    }

    // === INIT ===
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();

      // Theme toggle
      document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

      // Hamburger
      document.getElementById('hamburger').addEventListener('click', () => {
        const overlay = document.getElementById('mobile-overlay');
        if (overlay.classList.contains('open')) {
          closeMobileMenu();
        } else {
          openMobileMenu();
        }
      });
      document.getElementById('mobile-close').addEventListener('click', closeMobileMenu);

      // Stats bar initial values
      const cats = [...new Set(ARTICLES.map(a => a.category))];
      document.getElementById('stat-total').textContent = ARTICLES.length;
      document.getElementById('stat-cats').textContent = cats.length;

      // Render
      renderFeatured();
      renderPills();
      render();

      // Back to top
      initBackToTop();

      // Scroll animations
      observeNewElements();
    });
  </script>

</body>
</html>
